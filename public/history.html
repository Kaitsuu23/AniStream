<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/img/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png" />
  <link rel="manifest" href="/img/site.webmanifest" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Riwayat Tontonan - AniStream</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .history-header h1 { font-size: 1.2rem; font-weight: 700; }
    .history-clear-btn {
      padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--text2); font-size: 0.8rem; cursor: pointer;
      transition: all .2s;
    }
    .history-clear-btn:hover { border-color: #ef4444; color: #ef4444; }

    .history-empty { text-align: center; padding: 60px 20px; color: var(--text2); }
    .history-empty .icon { font-size: 3rem; margin-bottom: 12px; }

    .history-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }

    .history-card { position: relative; cursor: pointer; border-radius: 10px; overflow: hidden; background: var(--card); border: 1px solid var(--border); transition: transform .2s, border-color .2s; }
    .history-card:hover { transform: translateY(-3px); border-color: #38bdf8; }
    .history-card-thumb { position: relative; aspect-ratio: 3/4; overflow: hidden; }
    .history-card-thumb img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }
    .history-card-thumb .overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,.8) 0%, transparent 50%); }
    .history-card-ep { position: absolute; bottom: 8px; left: 8px; background: rgba(56,189,248,.9); color: #000; font-size: 0.7rem; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
    .history-card-info { padding: 8px 10px; }
    .history-card-title { font-size: 0.78rem; font-weight: 600; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .history-card-date { font-size: 0.68rem; color: var(--text2); margin-top: 4px; }
    .history-card-remove {
      position: absolute; top: 6px; right: 6px; width: 22px; height: 22px;
      background: rgba(0,0,0,.6); border: none; border-radius: 50%; color: #fff;
      font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .2s;
    }
    .history-card:hover .history-card-remove { opacity: 1; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">⚡ AniStream</a>
    <button class="hamburger" id="hamburger">☰</button>
    <ul class="nav-links" id="navLinks">
      <li><a href="/">Home</a></li>
      <li><a href="/ongoing/">Ongoing</a></li>
      <li><a href="/completed/">Completed</a></li>
      <li><a href="/schedule/">Schedule</a></li>
      <li><a href="/history/" class="active">History</a></li>
    </ul>
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Cari donghua..." autocomplete="off" />
      <div class="search-dropdown" id="searchDropdown"></div>
    </div>
  </nav>

  <div class="container page-fade" style="padding: 24px 0 60px;">
    <div class="history-header">
      <h1>🕐 Riwayat Tontonan</h1>
      <button class="history-clear-btn" id="clearBtn">Hapus Semua</button>
    </div>
    <div id="historyEmpty" class="history-empty" style="display:none;">
      <div class="icon">📭</div>
      <p>Belum ada riwayat tontonan.</p>
    </div>
    <div class="history-grid" id="historyGrid"></div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="/js/app.js"></script>
  <script src="/js/router.js"></script>
  <script>
    initSearch();
    initNav();

    function renderHistory() {
      const history = getWatchHistory();
      const grid = document.getElementById('historyGrid');
      const empty = document.getElementById('historyEmpty');
      if (!history.length) {
        empty.style.display = 'block';
        grid.innerHTML = '';
        return;
      }
      empty.style.display = 'none';
      grid.innerHTML = history.map(item => `
        <div class="history-card" onclick="navigate('/episode/${encodeURIComponent(item.id)}')">
          <div class="history-card-thumb">
            <img src="${item.poster || '/img/placeholder.svg'}" alt="${item.title}" onerror="this.src='/img/placeholder.svg'" />
            <div class="overlay"></div>
            ${item.epNum ? `<span class="history-card-ep">EP ${item.epNum}</span>` : ''}
          </div>
          <div class="history-card-info">
            <div class="history-card-title">${item.animeTitle || item.title}</div>
            <div class="history-card-date">${item.watchedAt}</div>
          </div>
          <button class="history-card-remove" onclick="event.stopPropagation(); removeHistory('${item.id}'); renderHistory();">✕</button>
        </div>`).join('');
    }

    document.getElementById('clearBtn').addEventListener('click', () => {
      if (confirm('Hapus semua riwayat?')) { clearWatchHistory(); renderHistory(); }
    });

    renderHistory();
  </script>
</body>
</html>
